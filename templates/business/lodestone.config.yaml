# Lodestone Configuration — Business Operations Template
# Optimized for CRM, lead management, and client communication

llm:
  default:
    type: ollama
    model: glm-5.2:cloud
    baseUrl: http://127.0.0.1:11434/api
    contextWindow: 128000
    maxTokens: 8192

memory:
  vectorDb:
    provider: lancedb
    path: ./workspace/data/lancedb
    embedding:
      provider: ollama
      model: nomic-embed-text
      dimensions: 768
    autoRecall: true
    autoCapture: true    # Auto-capture conversations — business context matters

  wiki:
    path: ./workspace/memory/wiki
    autoLint: true
    autoIndex: true

  scratch:
    path: ./workspace/data/scratch.db

identity:
  dir: ./workspace

session:
  compactionThreshold: 0.4   # Compact earlier — business context is valuable
  keepRecentCount: 20
  maxEntries: 300

proactive:
  sensorium:
    enabled: true
    interval: 15m    # Check pipeline more frequently
  sleep:
    enabled: true
    schedule: "0 3 * * *"
    timezone: "America/Toronto"
  drift:
    enabled: true
    schedule: "0 9 * * 1"
  morningBrief:
    enabled: true
    schedule: "0 8 * * 1-5"   # Weekday mornings
    timezone: "America/Toronto"

scheduler:
  maxConcurrent: 4

logging:
  level: info
  file: ./workspace/data/logs/lodestone.log